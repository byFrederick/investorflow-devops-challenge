name: 🚀 App Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - qa
          - stg
          - prd

concurrency:
  group: '${{ github.workflow }}-${{ inputs.environment }} @ ${{ github.ref }}'
  cancel-in-progress: false

jobs:
  app-deploy:
    name: App Deployment to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - name: Checkout current code ref
        uses: actions/checkout@v4

      - name: Login to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Task
        uses: go-task/setup-task@v1
        with:
          version: 3.46.0

      - name: Install werf
        uses: werf/actions/install@v2
        with:
          version: v2.51.6

      - name: Install Kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.2.12'

      - name: Deployment
        run: task deploy
        env:
          ENVIRONMENT: ${{ inputs.environment }}
